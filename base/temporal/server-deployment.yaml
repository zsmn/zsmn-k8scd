---
# Temporal v1.29.4 - Server Deployment
# VERSION: Update image.tag to upgrade Temporal.
# UPGRADE NOTE: After schema upgrade, change image tag here.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-server
  namespace: temporal
  labels:
    app: temporal-server
    app.kubernetes.io/name: temporal
    app.kubernetes.io/version: "1.29.4"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-server
  template:
    metadata:
      labels:
        app: temporal-server
        app.kubernetes.io/version: "1.29.4"
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:15
          command: ["sh", "-c"]
          args:
            - |
              until pg_isready -h postgres.temporal.svc.cluster.local -p 5432 -U temporal; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
      containers:
        - name: temporal-server
          image: temporalio/server:1.29.4
          ports:
            - containerPort: 7233
              name: grpc
            - containerPort: 9090
              name: metrics
          env:
            - name: DB
              value: "postgres12"
            - name: POSTGRES_SEEDS
              value: "postgres.temporal.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: "temporal"
            - name: POSTGRES_PWD
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: POSTGRES_PASSWORD
            - name: DBNAME
              value: "temporal"
            - name: VISIBILITY_DBNAME
              value: "temporal_visibility"
            - name: ENABLE_ES
              value: "false"
            - name: NUM_HISTORY_SHARDS
              value: "4"
            - name: LOG_LEVEL
              value: "info"
            - name: DYNAMIC_CONFIG_FILE_PATH
              value: "/etc/temporal/config/dynamicconfig/docker.yaml"
            - name: BIND_ON_IP
              value: "0.0.0.0"
            - name: TEMPORAL_BROADCAST_ADDRESS
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          volumeMounts:
            - name: dynamic-config
              mountPath: /etc/temporal/config/dynamicconfig
          readinessProbe:
            httpGet:
              path: /health
              port: 7233
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 7233
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: dynamic-config
          configMap:
            name: temporal-dynamic-config