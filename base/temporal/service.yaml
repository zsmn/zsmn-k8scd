---
# Temporal v1.29.4 - Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: temporal-frontend
  namespace: temporal
  labels:
    app: temporal-server
spec:
  type: NodePort
  ports:
    - name: grpc
      port: 7233
      targetPort: 7233
    - name: metrics
      port: 9090
      targetPort: 9090
  selector:
    app: temporal-server