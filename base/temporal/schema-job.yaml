---
# Temporal v1.29.4 - Schema Setup Job
# VERSION: Must match Temporal server version.
# UPGRADE NOTE: Re-run this job after upgrading schema version.
apiVersion: batch/v1
kind: Job
metadata:
  name: temporal-schema-setup
  namespace: temporal
  labels:
    app: temporal-schema-setup
    app.kubernetes.io/version: "1.29.4"
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: temporal-schema-setup
    spec:
      restartPolicy: OnFailure
      containers:
        - name: schema-setup
          image: temporalio/admin-tools:1.29.4
          command: ["bash", "-c"]
          args:
            - |
              set -e
              echo "Waiting for PostgreSQL to be ready..."
              until pg_isready -h postgres.temporal.svc.cluster.local -p 5432 -U temporal 2>/dev/null; do
                echo "PostgreSQL not ready yet, waiting..."
                sleep 2
              done
              sleep 3

              echo "Creating databases if they don't exist..."
              PGPASSWORD=temporal psql -h postgres.temporal.svc.cluster.local -U temporal -d postgres -c "SELECT 1 FROM pg_database WHERE datname='temporal'" | grep -q 1 || PGPASSWORD=temporal createdb -h postgres.temporal.svc.cluster.local -U temporal temporal
              PGPASSWORD=temporal psql -h postgres.temporal.svc.cluster.local -U temporal -d postgres -c "SELECT 1 FROM pg_database WHERE datname='temporal_visibility'" | grep -q 1 || PGPASSWORD=temporal createdb -h postgres.temporal.svc.cluster.local -U temporal temporal_visibility

              echo "Setting up default database schema..."
              temporal-sql-tool \
                --endpoint postgres.temporal.svc.cluster.local \
                --port 5432 \
                --database temporal \
                --username temporal \
                --password temporal \
                --plugin postgresql12 \
                setup-schema \
                --schema-dir /etc/temporal/schema/postgresql/v12/temporal/versioned \
                --version v1.0

              echo "Updating default database schema to latest..."
              temporal-sql-tool \
                --endpoint postgres.temporal.svc.cluster.local \
                --port 5432 \
                --database temporal \
                --username temporal \
                --password temporal \
                --plugin postgresql12 \
                update-schema \
                --schema-dir /etc/temporal/schema/postgresql/v12/temporal/versioned

              echo "Setting up visibility database schema..."
              temporal-sql-tool \
                --endpoint postgres.temporal.svc.cluster.local \
                --port 5432 \
                --database temporal_visibility \
                --username temporal \
                --password temporal \
                --plugin postgresql12 \
                setup-schema \
                --schema-dir /etc/temporal/schema/postgresql/v12/visibility/versioned \
                --version v1.0

              echo "Updating visibility database schema to latest..."
              temporal-sql-tool \
                --endpoint postgres.temporal.svc.cluster.local \
                --port 5432 \
                --database temporal_visibility \
                --username temporal \
                --password temporal \
                --plugin postgresql12 \
                update-schema \
                --schema-dir /etc/temporal/schema/postgresql/v12/visibility/versioned

              echo "Schema setup complete!"
          env:
            - name: DB_TYPE
              value: "postgresql"
            - name: DB_HOST
              value: "postgres.temporal.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "temporal"
            - name: DB_PASSWORD
              value: "temporal"
            - name: DB_NAME
              value: "temporal"
            - name: VISIBILITY_DB_NAME
              value: "temporal_visibility"