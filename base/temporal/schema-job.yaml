---
# Temporal v1.29.4 - Schema Setup Job
# VERSION: Must match Temporal server version.
# UPGRADE NOTE: Re-run this job after upgrading schema version.
apiVersion: batch/v1
kind: Job
metadata:
  name: temporal-schema-setup
  namespace: temporal
  labels:
    app: temporal-schema-setup
    app.kubernetes.io/version: "1.29.4"
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: temporal-schema-setup
    spec:
      restartPolicy: OnFailure
      containers:
        - name: schema-setup
          image: temporalio/admin-tools:1.29.4
          command: ["bash", "-c"]
          args:
            - |
              set -e
              echo "Waiting for PostgreSQL to be ready..."
              until temporal_operator_cluster_healthcheck --address postgres:5432 --database temporal 2>/dev/null; do
                echo "PostgreSQL not ready yet, waiting..."
                sleep 2
              done

              echo "Setting up default database schema..."
              temporal_operator_cluster_schema_setup \
                --address postgres:5432 \
                --database temporal \
                --username temporal \
                --password temporal \
                --schema-dir /etc/temporal/schema/postgresql/v96/temporal/versioned \
                --endpoint postgres.temporal.svc.cluster.local \
                --port 5432 \
                --plugin postgresql12

              echo "Setting up visibility database schema..."
              temporal_operator_cluster_schema_setup \
                --address postgres:5432 \
                --database temporal_visibility \
                --username temporal \
                --password temporal \
                --schema-dir /etc/temporal/schema/postgresql/v96/visibility/versioned \
                --endpoint postgres.temporal.svc.cluster.local \
                --port 5432 \
                --plugin postgresql12

              echo "Schema setup complete!"
          env:
            - name: DB_TYPE
              value: "postgresql"
            - name: DB_HOST
              value: "postgres.temporal.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "temporal"
            - name: DB_PASSWORD
              value: "temporal"
            - name: DB_NAME
              value: "temporal"
            - name: VISIBILITY_DB_NAME
              value: "temporal_visibility"