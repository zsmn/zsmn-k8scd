---
# Temporal v1.29.4 - Admin Tools (for CLI access)
# UPGRADE NOTE: Update image tag when upgrading Temporal version.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-admin-tools
  namespace: temporal
  labels:
    app: temporal-admin-tools
    app.kubernetes.io/version: "1.29.4"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-admin-tools
  template:
    metadata:
      labels:
        app: temporal-admin-tools
        app.kubernetes.io/version: "1.29.4"
    spec:
      containers:
        - name: admin-tools
          image: temporalio/admin-tools:1.29.4
          stdin: true
          tty: true
          env:
            - name: TEMPORAL_CLI_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: temporal-config
                  key: TEMPORAL_CLI_ADDRESS